aid: tishman-speyer
name: Tishman Speyer
description: >-
  Tishman Speyer is a privately held, global real estate developer, operator,
  and investment manager founded in 1978 by Robert Tishman and Jerry Speyer
  and headquartered at 45 Rockefeller Plaza in New York City. The firm acquires,
  develops, operates, and manages first-class office, residential, retail,
  industrial, mixed-use, and life-science properties across roughly 40 global
  markets in the Americas, Europe, and Asia. Its signature portfolio includes
  Rockefeller Center and the MetLife Building in New York, the MesseTurm in
  Frankfurt, The Spiral at Hudson Yards, and Mission Rock in San Francisco.
  Tishman Speyer also operates the Zo tenant-experience program, the Studio
  flex-workplace platform, the Breakthrough Properties life-science joint
  venture with Bellco Capital, and the TS Ventures proptech investment arm.
  The firm has reported approximately $65 billion in assets under management
  and approximately 3,000 employees. Tishman Speyer does not publish a public
  developer portal, OpenAPI specifications, SDKs, or open-source repositories;
  all engagement is handled through corporate, investor, leasing, and
  tenant-app channels.
